apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
images:
- name: nginx/nginx-ingress
  newTag: 3.4.1
commonLabels:
  environment: staging
patches:
- target:
    kind: Deployment
    name: nginx-ingress-controller
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
